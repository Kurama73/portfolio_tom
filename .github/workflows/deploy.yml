name: Deploy Portfolio

on:
  push:
    branches:
      - prod

concurrency:
  group: deploy-prod
  cancel-in-progress: true

env:
  DEPLOY_DIR: /DATA/AppData/mesSites/portfolio_tom

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate production clone
        run: |
          if [ ! -d "$DEPLOY_DIR/.git" ]; then
            echo "Production clone not found in $DEPLOY_DIR"
            exit 1
          fi

      - name: Update production clone
        run: |
          git config --global --add safe.directory "$DEPLOY_DIR"
          cd "$DEPLOY_DIR"
          git fetch origin prod
          git checkout prod
          git pull --ff-only origin prod

      - name: Prepare runtime folders
        run: |
          mkdir -p "$DEPLOY_DIR/backend/data"
          mkdir -p "$DEPLOY_DIR/backend/public/images/uploads"
          if [ ! -f "$DEPLOY_DIR/backend/.env" ]; then
            touch "$DEPLOY_DIR/backend/.env"
          fi

      - name: Build frontend in production folder
        run: |
          cd "$DEPLOY_DIR/frontend"
          npm ci
          rm -rf dist_next
          npm run build -- --outDir dist_next
          mkdir -p dist
          cp -a dist_next/. dist/
          rm -rf dist_next

      - name: Rebuild and restart stack
        run: |
          cd "$DEPLOY_DIR"
          APP_VERSION="${GITHUB_SHA}" docker compose up -d --build --remove-orphans

      - name: Smoke checks (images + api meta)
        run: |
          set -e
          cd "$DEPLOY_DIR"

          # Wait for nginx static serving (can flap briefly during container restart)
          for i in $(seq 1 20); do
            if curl -fsS "http://localhost:8081/images/projects/LootBoxHunter/2.png" > /dev/null; then
              break
            fi
            if [ "$i" -eq 20 ]; then
              echo "Static image smoke check failed after retries"
              docker compose ps
              docker compose logs --tail=80
              exit 1
            fi
            sleep 2
          done

          # Wait for backend to be reachable through nginx proxy
          for i in $(seq 1 25); do
            if curl -fsS "http://localhost:8081/api/meta" > /dev/null; then
              break
            fi
            if [ "$i" -eq 25 ]; then
              echo "API meta smoke check failed after retries"
              docker compose ps
              docker compose logs --tail=120
              exit 1
            fi
            sleep 2
          done
