services:
  backend:
    build: ./backend
    container_name: portfolio-backend
    restart: always
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
      - ./backend/public/images/uploads:/app/public/images/uploads
    environment:
      DB_PATH: /app/data/portfolio.db
    env_file:
      - ./backend/.env

  nginx:
    image: nginx:latest
    container_name: portfolio-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "8081:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
